<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QBS 8-18 — Laboratorio di Formazione</title>
<style>
:root {
  --blue:#1A5276; --blue-l:#D6EAF8; --blue-m:#2E86C1;
  --green:#1E8449; --green-l:#D5F5E3; --green-m:#27AE60;
  --amber:#784212; --amber-l:#FDEBD0; --amber-m:#CA6F1E;
  --gray:#2C3E50; --gray-l:#F4F6F8; --gray-m:#7F8C8D;
  --yellow:#FFF9C4; --white:#fff;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray-l);color:var(--gray);min-height:100vh;}

nav{background:var(--gray);color:#fff;padding:13px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.logo{font-size:1.15rem;font-weight:800;letter-spacing:1px;}
.logo span{color:#AED6F1;}
.nav-right{margin-left:auto;font-size:0.8rem;color:#AED6F1;}

.screen{display:none;}
.screen.active{display:block;}

/* HOME */
.hero{background:linear-gradient(135deg,var(--gray) 0%,var(--blue) 100%);color:#fff;padding:52px 24px 36px;text-align:center;}
.hero h1{font-size:2.6rem;font-weight:800;letter-spacing:2px;}
.hero h1 span{color:#AED6F1;}
.hero p{margin-top:8px;color:#AED6F1;font-size:.95rem;}
.home-body{max-width:820px;margin:0 auto;padding:32px 16px;}
.home-body h2{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--gray);}

.case-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:32px;}
.case-card{background:#fff;border-radius:var(--r);border:2px solid #E5E8EC;padding:18px;cursor:pointer;transition:all .15s;}
.case-card:hover{border-color:var(--blue-m);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.10);}
.case-card.sel{border-color:var(--blue);background:var(--blue-l);}
.cn{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-m);}
.cm{font-size:.98rem;font-weight:700;margin:5px 0 3px;}
.cd{font-size:.8rem;color:var(--gray-m);line-height:1.5;}
.cb{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}

.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;}
.role-card{background:#fff;border-radius:var(--r);border:2px solid #E5E8EC;padding:16px 12px;cursor:pointer;text-align:center;transition:all .15s;}
.role-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.09);}
.role-card.rs{border-color:var(--blue);background:var(--blue-l);}
.role-card.rp{border-color:var(--green);background:var(--green-l);}
.role-card.rt{border-color:var(--amber);background:var(--amber-l);}
.ri{font-size:1.7rem;margin-bottom:5px;}
.rn{font-size:.88rem;font-weight:700;}
.rsub{font-size:.72rem;color:var(--gray-m);margin-top:2px;}

.btn-go{display:block;width:100%;max-width:280px;margin:0 auto;padding:13px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-go:hover{background:var(--blue-m);}
.btn-go:disabled{background:var(--gray-m);cursor:not-allowed;}

/* QUESTIONNAIRE VIEW */
.qh{padding:16px 24px;border-bottom:1px solid #E0E4E8;background:#fff;}
.qh-back{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.85rem;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.qh-title{font-size:1.15rem;font-weight:700;}
.qh-sub{font-size:.8rem;color:var(--gray-m);margin-top:2px;}
.qh-badge{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:700;color:#fff;}

.qbody{max-width:900px;margin:0 auto;padding:24px 16px 60px;}

.info-box{border-radius:var(--r);padding:16px 20px;margin-bottom:24px;border-left:5px solid;}
.info-box.s{background:var(--blue-l);border-color:var(--blue);}
.info-box.p{background:var(--green-l);border-color:var(--green);}
.info-box.t{background:var(--amber-l);border-color:var(--amber);}
.info-box h3{font-size:.88rem;font-weight:700;margin-bottom:5px;}
.info-box p{font-size:.82rem;line-height:1.65;}

.instr-box{background:#fff;border-radius:var(--r);border:1px dashed #BDC3C7;padding:14px 18px;margin-bottom:24px;}
.instr-box p{font-size:.8rem;color:var(--gray-m);line-height:1.65;}
.instr-box strong{color:var(--gray);}

/* ITEM TABLE */
.sub-block{background:#fff;border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.sub-title{padding:11px 18px;color:#fff;font-size:.88rem;font-weight:700;}
.sub-s{background:var(--blue);}
.sub-p{background:var(--green);}
.sub-t{background:var(--amber);}

.item-table{width:100%;border-collapse:collapse;}
.item-table th{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:center;background:#F0F2F5;color:var(--gray-m);}
.item-table th.item-th-n{width:38px;}
.item-table th.item-th-text{text-align:left;}
.item-table th.item-th-opt{width:100px;}
.item-table td{padding:9px 12px;border-bottom:1px solid #F0F4F8;font-size:.84rem;vertical-align:middle;}
.item-table tr:last-child td{border-bottom:none;}
.item-table .tn{text-align:center;font-weight:700;color:var(--gray-m);font-size:.76rem;}
.item-table .topt{text-align:center;}

/* Radio display — show pre-filled, non-interactive */
.opt-group{display:flex;justify-content:center;gap:4px;}
.opt{display:flex;flex-direction:column;align-items:center;gap:3px;width:80px;}
.opt-circle{width:20px;height:20px;border-radius:50%;border:2px solid #CCC;display:flex;align-items:center;justify-content:center;}
.opt-circle.checked{border-color:var(--blue);background:var(--blue);}
.opt-circle.checked.green{border-color:var(--green);background:var(--green);}
.opt-circle.checked.amber{border-color:var(--amber);background:var(--amber);}
.opt-circle.checked::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;}
.opt-lbl{font-size:.66rem;color:var(--gray-m);text-align:center;line-height:1.2;}

/* Highlight selected row */
.item-table tr.selected-row{background:var(--yellow);}
.item-table tr.selected-row .ttext{font-weight:500;}

/* Attrib note */
.attrib-note{background:#FFF9E6;border:1px dashed #D4AC0D;border-radius:var(--r);padding:12px 16px;margin-bottom:14px;}
.attrib-note h4{font-size:.8rem;font-weight:700;color:#7D6608;margin-bottom:3px;}
.attrib-note p{font-size:.77rem;color:#856404;line-height:1.55;}

.page-footer{text-align:center;padding:18px;font-size:.78rem;color:var(--gray-m);}
.btn-back-bottom{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:7px;border:1.5px solid var(--blue);background:#fff;color:var(--blue);font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:12px;}
.btn-back-bottom:hover{background:var(--blue-l);}

@media(max-width:600px){
  .role-grid{grid-template-columns:1fr;}
  .item-table th.item-th-opt{width:80px;}
  .opt{width:62px;}
}
</style>
</head>

   items:[{n:5,t:"L'alunno/a è autonomo/a nello svolgere i suoi compiti"},{n:8,t:"L'alunno/a ha difficoltà a scrivere",rev:true},{n:10,t:"L'alunno/a ha difficoltà a comprendere ciò che legge",rev:true},{n:16,t:"L'alunno/a ha difficoltà a concentrarsi",rev:true},{n:18,t:"L'alunno/a è pigro/a quando si tratta di fare i compiti"},{n:21,t:"L'alunno/a ha difficoltà a fare i calcoli"},{n:25,t:"L'alunno/a ha difficoltà a leggere",rev:true},{n:28,t:"L'alunno/a è in grado di gestire il proprio materiale scolastico (cartella, diario, astuccio...)"},{n:32,t:"L'alunno/a ha difficoltà a produrre dei testi scritti",rev:true},{n:33,t:"L'alunno/a ha difficoltà a seguire ragionamenti complessi"}]},
  {id:'t3',label:'3. Vissuti emotivi alunno/a',
   items:[{n:1,t:"Penso che l'alunno/a sia molto preoccupato/a dalle sue difficoltà",rev:true},{n:7,t:"L'alunno/a tende a ingigantire le sue difficoltà",rev:true},{n:9,t:"L'alunno/a si fa prendere dall'ansia quando ha qualche verifica o interrogazione",rev:true},{n:13,t:"Penso che l'alunno/a si intristisca a causa delle sue difficoltà",rev:true},{n:27,t:"Penso che l'alunno/a si arrabbi a causa delle sue difficoltà",rev:true}]},
  {id:'t4',label:'4. Consapevolezza alunno/a',
   items:[{n:14,t:"L'alunno/a mi parla delle sue difficoltà"},{n:15,t:"L'alunno/a è interessato/a a migliorarsi"},{n:26,t:"L'alunno/a si impegna per combattere le sue difficoltà"},{n:35,t:"Penso che l'alunno/a si renda bene conto delle sue difficoltà"}]},
  {id:'t5',label:'5. Rapporto con genitori',
   items:[{n:2,t:"I genitori dell'alunno/a sono disposti a collaborare con la scuola per aiutarlo/a"},{n:19,t:"I genitori dell'alunno/a conoscono bene quali sono le sue potenzialità"},{n:22,t:"Credo che i genitori dell'alunno/a siano in grado di aiutarlo/a"},{n:31,t:"I genitori dell'alunno/a conoscono bene quali sono le sue difficoltà"}]},
];

let selCase=null, selRole=null;

function renderHome(){
  document.getElementById('caseGrid').innerHTML = CASES.map(c=>`
    <div class="case-card" id="cc${c.id}" onclick="selC(${c.id})">
      <div class="cn">Caso ${c.id}</div>
      <div class="cm">${c.name}</div>
      <div class="cd">${c.desc}</div>
      <span class="cb" style="background:${c.bc}22;color:${c.bc}">${c.badge}</span>
    </div>`).join('');
  document.getElementById('roleGrid').innerHTML=`
    <div class="role-card" id="rS" onclick="selR('student')"><div class="ri">👤</div><div class="rn">Alunno/a</div><div class="rsub">QBS-B/R</div></div>
    <div class="role-card" id="rP" onclick="selR('parent')"><div class="ri">🏠</div><div class="rn">Genitore</div><div class="rsub">QBS-G</div></div>
    <div class="role-card" id="rT" onclick="selR('teacher')"><div class="ri">📋</div><div class="rn">Insegnante</div><div class="rsub">QBS-I</div></div>`;
}

function selC(id){
  selCase=id;
  document.querySelectorAll('.case-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('cc'+id).classList.add('sel');
  checkReady();
}
function selR(r){
  selRole=r;
  document.querySelectorAll('.role-card').forEach(c=>{c.className='role-card';});
  const map={student:'rs',parent:'rp',teacher:'rt'};
  const id={student:'rS',parent:'rP',teacher:'rT'};
  document.getElementById(id[r]).classList.add(map[r]);
  checkReady();
}
function checkReady(){document.getElementById('btnGo').disabled=!(selCase&&selRole);}

function getSubs(){return selRole==='student'?S_SUBS:selRole==='parent'?P_SUBS:T_SUBS;}
function getRoleClass(){return selRole==='student'?'s':selRole==='parent'?'p':'t';}
function getRoleColor(){return selRole==='student'?'var(--blue)':selRole==='parent'?'var(--green)':'var(--amber)';}
function getRoleName(){return selRole==='student'?'Alunno/a (QBS-B/R)':selRole==='parent'?'Genitore (QBS-G)':'Insegnante (QBS-I)';}
function getCircleClass(){return selRole==='student'?'':selRole==='parent'?'green':'amber';}

function renderOpts(selectedVal){
  const cls = getCircleClass();
  const labels=['Non vero','Abbastanza vero','Verissimo'];
  return `<div class="opt-group">${[0,1,2].map(v=>`
    <div class="opt">
      <div class="opt-circle${v===selectedVal?' checked '+cls:''}"></div>
      <div class="opt-lbl">${labels[v]}</div>
    </div>`).join('')}</div>`;
}

function renderSubTable(sub, answers, roleClass){
  let rows = sub.items.map((item,i)=>{
    const val = answers[i];
    const isSelected = val !== undefined;
    const revMark = item.rev ? ' <span style="font-size:.7rem;color:#E67E22;font-weight:700">(R)</span>' : '';
    return `<tr class="${isSelected?'selected-row':''}">
      <td class="tn">${item.n}</td>
      <td class="ttext">${item.t}${revMark}</td>
      <td class="topt">${isSelected ? renderOpts(val) : ''}</td>
    </tr>`;
  }).join('');
  return `<div class="sub-block">
    <div class="sub-title sub-${roleClass}">${sub.label}</div>
    <table class="item-table">
      <thead><tr>
        <th class="item-th-n">N.</th>
        <th class="item-th-text">Item</th>
        <th class="item-th-opt">Risposta</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function openQuestionnaire(){
  const c = CASES.find(x=>x.id===selCase);
  const profile = c[selRole];
  const subs = getSubs();
  const roleClass = getRoleClass();
  const answers = profile.answers;

  document.getElementById('qTitle').textContent=`Caso ${c.id} — ${c.name}`;
  document.getElementById('qSub').textContent=c.desc+' | '+getRoleName();
  const badge=document.getElementById('qBadge');
  badge.textContent=c.badge; badge.style.background=c.bc;

  let html=`<div class="info-box ${roleClass}">
    <h3>Profilo del personaggio</h3>
    <p>${profile.info}</p>
  </div>
  <div class="instr-box">
    <p><strong>Come usare questo questionario:</strong> Le risposte sono già contrassegnate. 
    Riporta il valore numerico di ogni risposta sulla griglia cartacea (Non vero = 0, Abbastanza vero = 1, Verissimo = 2). 
    Fai attenzione agli item con la sigla <strong style="color:#E67E22">(R)</strong>: il punteggio va invertito prima di sommare (0→2, 1→1, 2→0).
    Calcola totale grezzo, media e punteggio T a mano.</p>
  </div>`;

  subs.forEach(sub=>{
    html += renderSubTable(sub, answers[sub.id]||[], roleClass);
  });

  if(selRole==='student'){
    html+=`<div class="attrib-note">
      <h4>Item di Attribuzione causale — fuori scala (valutazione qualitativa)</h4>
      <p>Questi 3 item non contribuiscono al punteggio totale. Servono per valutare lo stile attributivo del ragazzo. Riportali sulla griglia ma NON includerli nella somma delle sottoscale.</p>
    </div>
    <div class="sub-block">
      <div class="sub-title sub-s">6. Attribuzione causale</div>
      <table class="item-table">
        <thead><tr><th class="item-th-n">N.</th><th class="item-th-text">Item</th><th class="item-th-opt">Risposta</th></tr></thead>
        <tbody>${S_ATT.map((item,i)=>{
          const val=(answers.att||[])[i];
          return `<tr class="${val!==undefined?'selected-row':''}">
            <td class="tn">${item.n}</td><td class="ttext">${item.t}</td>
            <td class="topt">${val!==undefined?renderOpts(val):''}</td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }

  html+=`<div style="text-align:center;padding:28px 0 8px">
    <button class="btn-back-bottom" onclick="goHome()">← Cambia caso o ruolo</button>
  </div>
  <div class="page-footer">QBS 8-18 — V. Tobia & G.M. Marzocchi, Erickson (2015; 2024) — Solo per uso formativo</div>`;

  document.getElementById('qBody').innerHTML=html;
  document.getElementById('navInfo').textContent=`Caso ${selCase} — ${getRoleName()}`;
  showScreen('screenQ');
  window.scrollTo(0,0);
}

function goHome(){showScreen('screenHome');document.getElementById('navInfo').textContent='LABORATORIO DI METODI E TECNICHE DI VALUTAZIONE DELLO SVILUPPO';}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

renderHome();
</script>
</body>
</html>
